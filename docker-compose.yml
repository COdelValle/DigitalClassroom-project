version: '3.8'

services:
  # Base de Datos - MariaDB
  mariadb:
    image: mariadb:11.0
    container_name: digital-classroom-db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: digital_classroom
    ports:
      - "3306:3306"
    volumes:
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - mariadb_data:/var/lib/mysql
    networks:
      - digital-classroom
    healthcheck:
      test: ["CMD", "mariadbd", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 500m
    cpus: 1

  # Assessment Manager (Evaluaciones)
  assessment-manager:
    build:
      context: ./backend
      dockerfile: Assessment_Manager/Dockerfile
    container_name: assessment-manager-service
    ports:
      - "8083:8083"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/assessment_manager_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EXTERNAL_SERVICES_STUDENT_URL: http://student-manager:8081
      EXTERNAL_SERVICES_ACADEMIC_URL: http://classroom-manager:8084
    networks:
      - digital-classroom
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 400m
    cpus: 0.7

  # Student Manager (Estudiantes)
  student-manager:
    build:
      context: ./backend
      dockerfile: Student_Manager/Dockerfile
    container_name: student-manager-service
    ports:
      - "8081:8081"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/student_manager_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - digital-classroom
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 400m
    cpus: 0.7

  # Classroom Manager (Cursos y Salas)
  classroom-manager:
    build:
      context: ./backend
      dockerfile: Classroom_Manager/Dockerfile
    container_name: classroom-manager-service
    ports:
      - "8084:8084"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/classroom_manager_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EXTERNAL_SERVICES_STUDENT_URL: http://student-manager:8081
    networks:
      - digital-classroom
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 400m
    cpus: 0.7

  # BFF Web (API Gateway)
  bff-web:
    build:
      context: ./backend
      dockerfile: BFF_Web/Dockerfile
    container_name: bff-web-service
    ports:
      - "8080:8080"
    depends_on:
      - assessment-manager
      - student-manager
      - classroom-manager
    environment:
      ASSESSMENT_SERVICE_URL: http://assessment-manager:8083
      STUDENT_SERVICE_URL: http://student-manager:8081
      CLASSROOM_SERVICE_URL: http://classroom-manager:8084
    networks:
      - digital-classroom
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 400m
    cpus: 0.7

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digital-classroom-frontend
    ports:
      - "5173:5173"
    depends_on:
      - bff-web
    environment:
      VITE_ASSESSMENT_MANAGER_URL: http://localhost:8083/api/v1
      VITE_CLASSROOM_MANAGER_URL: http://localhost:8084/api/v1
      VITE_STUDENT_MANAGER_URL: http://localhost:8081/api/v1
      VITE_BFF_WEB_URL: http://localhost:8080/api/v1/bff
    networks:
      - digital-classroom
    mem_limit: 200m
    cpus: 0.5

networks:
  digital-classroom:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
