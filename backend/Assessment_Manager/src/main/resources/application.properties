spring.application.name=Assessment_Manager
server.port=8083

# Spring Configuration
spring.main.allow-bean-definition-overriding=true

# Configuración de la URL de conexión
spring.datasource.url=jdbc:mariadb://localhost:3306/assessment_manager_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Inicializar datos
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Estas URLs apuntan a los otros microservicios
external.services.student-url=http://localhost:8081
external.services.academic-url=http://localhost:8084

# Circuit Breaker para Estudiantes
resilience4j.circuitbreaker.instances.studentServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.studentServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.studentServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.studentServiceCB.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.studentServiceCB.permittedNumberOfCallsInHalfOpenState=3

# Circuit Breaker para Académico
resilience4j.circuitbreaker.instances.academicServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.academicServiceCB.slidingWindowSize=6
resilience4j.circuitbreaker.instances.academicServiceCB.failureRateThreshold=40
resilience4j.circuitbreaker.instances.academicServiceCB.waitDurationInOpenState=15s
resilience4j.circuitbreaker.instances.academicServiceCB.permittedNumberOfCallsInHalfOpenState=2

# Configuración de Swagger
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operationsSorter=method

# ==================== JWT CONFIGURATION ====================
jwt.secret=${JWT_SECRET:digitalClassroom2026SecretKeyForJWTAuthenticationAndAuthorizationPurposesOnly}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== ACTUATOR + PROMETHEUS ====================
# Exponer todos los endpoints de actuator
management.endpoints.web.exposure.include=health,metrics,prometheus,info,loggers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==================== JWT CONFIGURATION ====================
# Clave secreta para firmar tokens (cambiar en producción)
jwt.secret=digitalClassroom2026SecretKeyForJWTAuthenticationAndAuthorizationPurposesOnlyChangeInProduction

# Expiración en milisegundos (86400000 = 24 horas)
jwt.expiration=86400000